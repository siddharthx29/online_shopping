<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shopdeal - Electronics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="index.css" rel="stylesheet">
</head>
<body>

<!-- Floating Graphics -->
<div class="floating-graphics">
  <i class="bi bi-laptop floating-icon"></i>
  <i class="bi bi-phone floating-icon"></i>
  <i class="bi bi-smartwatch floating-icon"></i>
  <i class="bi bi-speaker floating-icon"></i>
  <i class="bi bi-camera floating-icon"></i>
</div>

<!-- Navbar (Amazon/Flipkart Style) -->
<nav class="navbar navbar-expand-lg navbar-main">
  <div class="container-fluid px-2 px-md-4 align-items-center">
    <div class="d-flex align-items-center">
      <button class="navbar-toggler bg-light me-2 border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" style="padding: 0.25rem 0.5rem;">
        <span class="navbar-toggler-icon" style="height: 1.2em; width: 1.2em;"></span>
      </button>
      <a class="navbar-brand m-0" href="index.html">Shopdeal</a>
    </div>

    <!-- Mobile Cart & Account -->
    <div class="d-flex d-lg-none align-items-center gap-3">
      <a class="text-white text-decoration-none" href="account.html"><i class="bi bi-person fs-4"></i></a>
      <a class="text-white text-decoration-none position-relative" href="cart.html">
        <i class="bi bi-cart3 fs-4"></i>
        <span class="badge bg-warning text-dark position-absolute top-0 start-100 translate-middle rounded-pill" style="font-size: 0.6rem;" id="cart-count-mobile">0</span>
      </a>
    </div>

    <div class="collapse navbar-collapse" id="navMenu">
      <!-- Search bar (Desktop) -->
      <form class="search-bar d-none d-lg-flex flex-grow-1 mx-4" onsubmit="event.preventDefault(); window.location.href='shop.html';">
        <select class="search-cat form-select" style="width: auto;">
          <option>All</option>
          <option selected>Electronics</option>
          <option>Fashion</option>
        </select>
        <input type="text" placeholder="Search Electronics" aria-label="Search">
        <button type="submit"><i class="bi bi-search"></i></button>
      </form>

      <!-- Desktop Nav Icons -->
      <ul class="navbar-nav ms-auto align-items-center d-none d-lg-flex">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Home</a></li>
        <li class="nav-item"><a class="nav-link" href="shop.html"><i class="bi bi-shop"></i> Shop</a></li>
        <li class="nav-item mx-2"><a class="nav-link" href="account.html"><i class="bi bi-person"></i> Account</a></li>
        <li class="nav-item">
          <a class="nav-link d-flex align-items-end" href="cart.html" style="padding-bottom: 5px !important;">
            <i class="bi bi-cart3 fs-4 position-relative">
              <span class="badge bg-warning text-dark position-absolute top-0 start-100 translate-middle rounded-pill" style="font-size: 0.6rem;" id="cart-count">0</span>
            </i> 
            <span class="ms-2 mb-1 fw-bold">Cart</span>
          </a>
        </li>
      </ul>
      
      <!-- Mobile Sidebar Items inside collapse -->
      <ul class="navbar-nav ms-auto d-lg-none mt-3">
        <li class="nav-item"><a class="nav-link fs-5" href="index.html"><i class="bi bi-house"></i> Home</a></li>
        <li class="nav-item"><a class="nav-link fs-5" href="shop.html"><i class="bi bi-shop"></i> Shop All Products</a></li>
        <li class="nav-item"><a class="nav-link fs-5" href="account.html"><i class="bi bi-person-circle"></i> Your Account</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Mobile Search Bar -->
<div class="d-lg-none bg-dark px-2 pb-2" style="background-color: #131921 !important;">
  <form class="search-bar w-100" onsubmit="event.preventDefault(); window.location.href='shop.html';">
    <input type="text" placeholder="Search Shopdeal..." aria-label="Search" class="rounded-start" style="padding: 8px 12px;">
    <button type="submit"><i class="bi bi-search"></i></button>
  </form>
</div>

<!-- Sub-navbar -->
<div class="sub-nav d-flex gap-3 text-white overflow-hidden ps-2">
  <a href="shop.html" class="fw-bold"><i class="bi bi-list"></i> All</a>
  <a href="shop.html" class="d-none d-sm-inline">Today's Deals</a>
  <a href="customer-service.html" class="d-none d-sm-inline">Customer Service</a>
  <a href="electronics.html" class="d-none d-md-inline" style="border-bottom: 2px solid #fff;">Electronics</a>
  <a href="shop.html" class="d-none d-md-inline">Fashion</a>
</div>

<div class="container my-4 my-md-5 px-3 px-md-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold m-0"><i class="bi bi-lightning-charge"></i> Electronics Store</h3>
    <span class="text-muted">12 items found</span>
  </div>
  
  <div class="row" id="electronics-products"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let countEl = document.getElementById("cart-count");
if (countEl) countEl.textContent = cart.length;
let countMobileEl = document.getElementById("cart-count-mobile");
if (countMobileEl) countMobileEl.textContent = cart.length;

const electronics = [
  { id:101, name:"Apple iPhone 15 Pro", price:134999, image:"https://images.pexels.com/photos/19931448/pexels-photo-19931448.jpeg" },
  { id:102, name:"Samsung 4K Smart TV 55\"", price:52999, image:"https://images.pexels.com/photos/4009402/pexels-photo-4009402.jpeg" },
  { id:103, name:"Sony WH-1000XM5 ANC Headphones", price:29990, image:"https://images.pexels.com/photos/3394665/pexels-photo-3394665.jpeg" },
  { id:104, name:"MacBook Pro M3 Max", price:289999, image:"https://images.pexels.com/photos/18105/pexels-photo.jpg" },
  { id:105, name:"Canon EOS R6 Mark II", price:214999, image:"https://images.pexels.com/photos/51383/photo-camera-subject-photographer-51383.jpeg" },
  { id:106, name:"PlayStation 5 Console", price:54999, image:"https://images.pexels.com/photos/13189280/pexels-photo-13189280.jpeg" },
  { id:107, name:"Logitech MX Master 3S Mouse", price:8999, image:"https://images.pexels.com/photos/2115256/pexels-photo-2115256.jpeg" },
  { id:108, name:"Apple iPad Air (M1)", price:54900, image:"https://images.pexels.com/photos/1334598/pexels-photo-1334598.jpeg" },
  { id:109, name:"JBL Flip 6 Bluetooth Speaker", price:9999, image:"https://images.pexels.com/photos/1279365/pexels-photo-1279365.jpeg" },
  { id:110, name:"Dell UltraSharp 27 Monitor", price:34000, image:"https://images.pexels.com/photos/1029757/pexels-photo-1029757.jpeg" },
  { id:111, name:"Apple AirPods Pro (2nd Gen)", price:24900, image:"https://images.pexels.com/photos/3780681/pexels-photo-3780681.jpeg" },
  { id:112, name:"Samsung Galaxy Watch 6", price:29999, image:"https://images.pexels.com/photos/437037/pexels-photo-437037.jpeg" }
];

function renderElectronics(){
  const container = document.getElementById("electronics-products");
  electronics.forEach(p=>{
    const col = document.createElement("div");
    col.className="col-6 col-md-4 col-lg-3 mb-3 mb-md-4";
    col.innerHTML=`
      <div class="product-card">
        <img src="${p.image}" alt="${p.name}">
        <div class="product-card-body">
          <div>
            <h5>${p.name}</h5>
            <div class="product-price"><span>₹</span>${p.price.toLocaleString()}</div>
          </div>
          <button class="btn btn-add-cart w-100 mt-2" onclick="addToCart(${p.id})">
            Add to Cart
          </button>
        </div>
      </div>`;
    container.appendChild(col);
  });
}

function addToCart(id){
  const item = electronics.find(p=>p.id===id);
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  let countEl = document.getElementById("cart-count");
  if (countEl) countEl.textContent = cart.length;
  let countMobileEl = document.getElementById("cart-count-mobile");
  if (countMobileEl) countMobileEl.textContent = cart.length;
  alert(item.name + " added to cart!");
}

renderElectronics();
</script>
</body>
</html>

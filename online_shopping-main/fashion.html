<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shopdeal - Fashion</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="index.css" rel="stylesheet">
</head>
<body>

<!-- Floating Graphics -->
<div class="floating-graphics">
  <i class="bi bi-handbag floating-icon"></i>
  <i class="bi bi-watch floating-icon"></i>
  <i class="bi bi-eyeglasses floating-icon"></i>
  <i class="bi bi-gem floating-icon"></i>
  <i class="bi bi-scissors floating-icon"></i>
</div>

<!-- Navbar (Amazon/Flipkart Style) -->
<nav class="navbar navbar-expand-lg navbar-main">
  <div class="container-fluid px-2 px-md-4 align-items-center">
    <div class="d-flex align-items-center">
      <button class="navbar-toggler bg-light me-2 border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" style="padding: 0.25rem 0.5rem;">
        <span class="navbar-toggler-icon" style="height: 1.2em; width: 1.2em;"></span>
      </button>
      <a class="navbar-brand m-0" href="index.html">Shopdeal</a>
    </div>

    <!-- Mobile Cart & Account -->
    <div class="d-flex d-lg-none align-items-center gap-3">
      <a class="text-white text-decoration-none" href="account.html"><i class="bi bi-person fs-4"></i></a>
      <a class="text-white text-decoration-none position-relative" href="cart.html">
        <i class="bi bi-cart3 fs-4"></i>
        <span class="badge bg-warning text-dark position-absolute top-0 start-100 translate-middle rounded-pill" style="font-size: 0.6rem;" id="cart-count-mobile">0</span>
      </a>
    </div>

    <div class="collapse navbar-collapse" id="navMenu">
      <form class="search-bar d-none d-lg-flex flex-grow-1 mx-4" onsubmit="event.preventDefault(); window.location.href='shop.html';">
        <select class="search-cat form-select" style="width: auto;">
          <option>All</option>
          <option>Electronics</option>
          <option selected>Fashion</option>
        </select>
        <input type="text" placeholder="Search Fashion" aria-label="Search">
        <button type="submit"><i class="bi bi-search"></i></button>
      </form>

      <ul class="navbar-nav ms-auto align-items-center d-none d-lg-flex">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Home</a></li>
        <li class="nav-item"><a class="nav-link" href="shop.html"><i class="bi bi-shop"></i> Shop</a></li>
        <li class="nav-item mx-2"><a class="nav-link" href="account.html"><i class="bi bi-person"></i> Account</a></li>
        <li class="nav-item">
          <a class="nav-link d-flex align-items-end" href="cart.html" style="padding-bottom: 5px !important;">
            <i class="bi bi-cart3 fs-4 position-relative">
              <span class="badge bg-warning text-dark position-absolute top-0 start-100 translate-middle rounded-pill" style="font-size: 0.6rem;" id="cart-count">0</span>
            </i> 
            <span class="ms-2 mb-1 fw-bold">Cart</span>
          </a>
        </li>
      </ul>
      
      <ul class="navbar-nav ms-auto d-lg-none mt-3">
        <li class="nav-item"><a class="nav-link fs-5" href="index.html"><i class="bi bi-house"></i> Home</a></li>
        <li class="nav-item"><a class="nav-link fs-5" href="shop.html"><i class="bi bi-shop"></i> Shop All Products</a></li>
        <li class="nav-item"><a class="nav-link fs-5" href="account.html"><i class="bi bi-person-circle"></i> Your Account</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Mobile Search Bar -->
<div class="d-lg-none bg-dark px-2 pb-2" style="background-color: #131921 !important;">
  <form class="search-bar w-100" onsubmit="event.preventDefault(); window.location.href='shop.html';">
    <input type="text" placeholder="Search Shopdeal..." aria-label="Search" class="rounded-start" style="padding: 8px 12px;">
    <button type="submit"><i class="bi bi-search"></i></button>
  </form>
</div>

<!-- Sub-navbar -->
<div class="sub-nav d-flex gap-3 text-white overflow-hidden ps-2">
  <a href="shop.html" class="fw-bold"><i class="bi bi-list"></i> All</a>
  <a href="deals.html" class="d-none d-sm-inline">Today's Deals</a>
  <a href="customer-service.html" class="d-none d-sm-inline">Customer Service</a>
  <a href="electronics.html" class="d-none d-md-inline">Electronics</a>
  <a href="fashion.html" class="d-none d-md-inline" style="border-bottom: 2px solid #fff;">Fashion</a>
</div>

<div class="container my-4 my-md-5 px-3 px-md-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold m-0"><i class="bi bi-stars text-warning"></i> Fashion & Apparel</h3>
    <span class="text-muted">12 items found</span>
  </div>
  
  <div class="row" id="fashion-products"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let countEl = document.getElementById("cart-count");
if (countEl) countEl.textContent = cart.length;
let countMobileEl = document.getElementById("cart-count-mobile");
if (countMobileEl) countMobileEl.textContent = cart.length;

const fashion = [
  { id:301, name:"Men's Casual Denim Jacket", price:2199, image:"https://images.pexels.com/photos/1036622/pexels-photo-1036622.jpeg" },
  { id:302, name:"Women's Floral Summer Dress", price:1899, image:"https://images.pexels.com/photos/2272940/pexels-photo-2272940.jpeg" },
  { id:303, name:"Nike Air Jordan 1", price:14999, image:"https://images.pexels.com/photos/2385477/pexels-photo-2385477.jpeg" },
  { id:304, name:"Fossil Chronograph Men's Watch", price:8999, image:"https://images.pexels.com/photos/2783873/pexels-photo-2783873.jpeg" },
  { id:305, name:"Gucci Unisex Sunglasses", price:24999, image:"https://images.pexels.com/photos/1493111/pexels-photo-1493111.jpeg" },
  { id:306, name:"Women's Leather Handbag", price:4500, image:"https://images.pexels.com/photos/1152077/pexels-photo-1152077.jpeg" },
  { id:307, name:"Levi's 511 Slim Fit Jeans", price:2599, image:"https://images.pexels.com/photos/4210866/pexels-photo-4210866.jpeg" },
  { id:308, name:"Adidas Ultraboost 22", price:11000, image:"https://images.pexels.com/photos/812871/pexels-photo-812871.jpeg" },
  { id:309, name:"Classic Red Stilettos", price:3199, image:"https://images.pexels.com/photos/3389419/pexels-photo-3389419.jpeg" },
  { id:310, name:"Men's Solid Formal Shirt", price:1299, image:"https://images.pexels.com/photos/297933/pexels-photo-297933.jpeg" },
  { id:311, name:"Puma Gym Duffle Bag", price:1499, image:"https://images.pexels.com/photos/1963283/pexels-photo-1963283.jpeg" },
  { id:312, name:"Women's Silk Scarf", price:899, image:"https://images.pexels.com/photos/2681751/pexels-photo-2681751.jpeg" }
];

function renderFashion(){
  const container = document.getElementById("fashion-products");
  fashion.forEach(p=>{
    const col = document.createElement("div");
    col.className="col-6 col-md-4 col-lg-3 mb-3 mb-md-4";
    col.innerHTML=`
      <div class="product-card">
        <img src="${p.image}" alt="${p.name}">
        <div class="product-card-body">
          <div>
            <h5>${p.name}</h5>
            <div class="product-price"><span>₹</span>${p.price.toLocaleString()}</div>
          </div>
          <button class="btn btn-add-cart w-100 mt-2" onclick="addToCart(${p.id})">
            Add to Cart
          </button>
        </div>
      </div>`;
    container.appendChild(col);
  });
}

function addToCart(id){
  const item = fashion.find(p=>p.id===id);
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  let countEl = document.getElementById("cart-count");
  if (countEl) countEl.textContent = cart.length;
  let countMobileEl = document.getElementById("cart-count-mobile");
  if (countMobileEl) countMobileEl.textContent = cart.length;
  alert(item.name + " added to cart!");
}

renderFashion();
</script>
</body>
</html>
